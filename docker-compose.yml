services:
  postgres:
    image: postgres:16-alpine
    container_name: pms-postgres
    environment:
      POSTGRES_DB: pms
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pms_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pms"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pms_pg_data:
