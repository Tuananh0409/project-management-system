spring.application.name=pms-backend

# Local: dùng profile dev (DevTools auto-restart). Production: SPRING_PROFILES_ACTIVE=prod
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# PostgreSQL (override via env or application-local.properties)
spring.datasource.url=jdbc:postgresql://localhost:5432/pms
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=10000

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT (đổi secret khi deploy production)
app.jwt.secret=${JWT_SECRET:pms-dev-secret-change-in-production-min-32-chars}
app.jwt.access-token-ttl-hours=${JWT_TTL_HOURS:24}
# Cookie httpOnly (dev: false; production HTTPS: true)
app.jwt.cookie-secure=${JWT_COOKIE_SECURE:false}

# Upload tệp đính kèm (project / task) — local disk; production có thể thay S3
app.upload.storage-dir=${UPLOAD_DIR:uploads}
app.upload.max-file-size-bytes=${UPLOAD_MAX_BYTES:20971520}

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB
