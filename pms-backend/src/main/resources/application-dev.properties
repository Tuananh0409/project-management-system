# Profile dev: bật khi chạy local (xem README)
#
# Tắt auto-restart: trên Windows DevTools hay thấy target/ đổi → restart → app tắt,
# Maven in BUILD SUCCESS dù không bấm Ctrl+C. Sau khi sửa Java: restart thủ công.
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# Override DB riêng từng máy (copy application-local.properties.example, không commit file đó)
spring.config.import=optional:classpath:application-local.properties
