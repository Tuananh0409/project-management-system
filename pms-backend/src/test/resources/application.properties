spring.datasource.url=jdbc:h2:mem:pms_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true

spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

app.jwt.secret=test-jwt-secret-key-at-least-32-characters-long
app.jwt.access-token-ttl-hours=24
app.jwt.cookie-secure=false
